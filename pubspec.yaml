name: roipayroll
description: "A comprehensive payroll management system for Nigerian businesses"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
    
  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0

  # UI & Utilities
  intl: ^0.20.2
  uuid: ^4.5.2
  email_validator: ^3.0.0
  timeago: ^3.6.1
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  http: ^1.6.0
  url_launcher: ^6.3.0

  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.14.2
  file_picker: ^10.3.10
  csv: ^7.2.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
